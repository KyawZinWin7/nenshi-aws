version: "3.8"

services:
  nenshi_mysql:
    image: mysql:latest
    container_name: nenshi_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nenshi_db
      MYSQL_USER: nenshi_user
      MYSQL_PASSWORD: nenshi_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nenshi_network

  nenshi_php:
    build:
      dockerfile: ./docker/php.dockerfile
    image: nenshi_php:latest
    container_name: nenshi_php
    volumes:
      - ./:/var/www/html
    depends_on:
      - nenshi_mysql
    ports:
      - "9000:9000"
      - "5173:5173"
    networks:
      - nenshi_network

  nenshi_nginx:
    image: nginx:latest
    container_name: nenshi_nginx
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - nenshi_php
    ports:
      - "8080:80"
    networks:
      - nenshi_network
volumes:
  mysql_data:
networks:
  nenshi_network:
    driver: bridge
